<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - ReferTrack | Smart Job Tracker & Referral Manager</title>
  <link rel="stylesheet" href="/api/css/style.css" />
</head>
<body>

  <div class="app-shell" style="flex-direction: column;">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <div class="brand-text">
          <span class="brand-name">ReferTrack</span>
          <span class="brand-tagline">Smart Job Tracker &amp; Referral Manager</span>
        </div>
      </div>
      <div class="user-info">
        <span id="userName">—</span>
        <button id="logoutBtn" class="btn btn-secondary btn-sm">Log out</button>
      </div>
    </header>

    <main class="main-content">

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total Saved</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="appliedCount">0</div>
          <div class="stat-label">Applied / In Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="offerCount">0</div>
          <div class="stat-label">Offers</div>
        </div>
        <div class="stat-card stat-card-referral">
          <div class="stat-value" id="referralCount">0</div>
          <div class="stat-label">Referrals Secured</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="rejectedCount">0</div>
          <div class="stat-label">Rejected</div>
        </div>
      </div>

      <div class="toolbar">
        <h2>Your Applications</h2>
        <div class="filter-row">
          <select id="referralFilter">
            <option value="">All referrals</option>
            <option value="WITH">Has referral</option>
            <option value="NOT_REQUESTED">Not requested</option>
            <option value="REQUESTED">Requested</option>
            <option value="REFERRED">Referred</option>
            <option value="NO_RESPONSE">No response</option>
            <option value="DECLINED">Declined</option>
          </select>
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option value="SAVED">Saved</option>
            <option value="APPLIED">Applied</option>
            <option value="SCREENING">Screening</option>
            <option value="TECHNICAL_ROUND">Technical Round</option>
            <option value="HR_ROUND">HR Round</option>
            <option value="OFFER">Offer</option>
            <option value="NEGOTIATING">Negotiating</option>
            <option value="REJECTED">Rejected</option>
          </select>
          <button id="addJobBtn" class="btn btn-primary" style="width: auto;">+ Add Job</button>
        </div>
      </div>

      <div id="jobList" class="job-grid"></div>

    </main>
  </div>

  <!-- Add / Edit Job Modal -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle">Add Job</h2>

      <form id="jobForm">
        <div class="field-row">
          <div class="field">
            <label for="company">Company *</label>
            <input type="text" id="company" placeholder="e.g. Fusion Practices" required />
          </div>
          <div class="field">
            <label for="roleName">Role *</label>
            <input type="text" id="roleName" placeholder="e.g. Java Backend Developer" required />
          </div>
        </div>

        <div class="field">
          <label for="jobUrl">Job URL</label>
          <input type="url" id="jobUrl" placeholder="https://..." />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="Mumbai / Remote" />
          </div>
          <div class="field">
            <label for="salary">Salary</label>
            <input type="text" id="salary" placeholder="e.g. 6-8 LPA" />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="companySize">Company size</label>
            <input type="text" id="companySize" placeholder="e.g. 50-200" />
          </div>
          <div class="field">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="jobType">Job type</label>
            <select id="jobType"></select>
          </div>
          <div class="field">
            <label for="status">Application status</label>
            <select id="status"></select>
          </div>
        </div>

        <div class="field">
          <label for="jobDescription">Job description</label>
          <textarea id="jobDescription" placeholder="Paste relevant parts of the JD..."></textarea>
        </div>

        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Interview notes, follow-ups..."></textarea>
        </div>

        <!-- ===================== REFERRAL SECTION ===================== -->
        <div class="referral-section">
          <div class="referral-section-header">
            <span class="referral-icon">🤝</span>
            <h3>Referral details</h3>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" id="hasReferral" />
            <span>I have (or am pursuing) a referral for this role</span>
          </label>

          <div id="referralFields" class="referral-fields">
            <div class="field-row">
              <div class="field">
                <label for="referrerName">Referrer name</label>
                <input type="text" id="referrerName" placeholder="e.g. Priya Sharma" />
              </div>
              <div class="field">
                <label for="referrerRelation">Relation</label>
                <input type="text" id="referrerRelation" placeholder="e.g. Ex-colleague, LinkedIn contact" />
              </div>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="referrerContact">Referrer contact</label>
                <input type="text" id="referrerContact" placeholder="email / LinkedIn / phone" />
              </div>
              <div class="field">
                <label for="referralRequestedDate">Requested on</label>
                <input type="date" id="referralRequestedDate" />
              </div>
            </div>

            <div class="field">
              <label for="referralStatus">Referral status</label>
              <select id="referralStatus"></select>
            </div>

            <div class="field">
              <label for="referralNotes">Referral notes</label>
              <textarea id="referralNotes" placeholder="What did they say? Did you send your resume? Any follow-up needed?"></textarea>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="saveBtn" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/api/js/common.js"></script>
  <script src="/api/js/jobs.js"></script>
</body>
</html>
